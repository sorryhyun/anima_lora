# APEX cold-start (no LoRA warm-start) — default warmup ratio.
#
# Same loss / hyperparameters as gui-methods/apex.toml, but starts from a
# rank-0 LoRA initialization instead of loading a prior T-LoRA checkpoint.
# The pure-L_sup warmup (apex_warmup_ratio = 0.20) builds the domain prior
# from scratch before APEX adversarial terms ramp in.
#
# Phase 0 measured −48% NFE=1 W1 on cold start in a 2D toy. Whether that
# regression carries over to real DiT training when the dataset overlaps
# the base model's pretraining distribution is exactly the question this
# bench answers — see scripts/bench_apex_coldstart.py.
#
# USAGE:
#   python scripts/bench_apex_coldstart.py
#   make lora-gui GUI_PRESETS=apex_coldstart       # standalone train
#   python tasks.py lora-gui apex_coldstart        # cross-platform

output_name = "anima_apex_coldstart"

# Cold-start: rank/alpha must be set explicitly because there is no
# checkpoint to infer them from. Match the warm-started config's effective
# rank (the shipped apex.toml warm-starts from a rank-64 T-LoRA via thin SVD).
network_dim = 64
network_alpha = 64

learning_rate = 1e-4
max_train_epochs = 2
save_every_n_epochs = 1
checkpointing_epochs = 1

use_shuffled_caption_variants = true
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

weighting_scheme = "apex_omega"

# APEX hyperparameters ------------------------------------------------------
apex_lambda = 1.0
apex_lambda_p = 1.0
apex_lambda_c = 1.0
apex_lambda_f = 1.0
apex_loss_form = "mix"

# Warmup is the only thing standing between cold-start init and APEX's
# random-trajectory failure mode. 0.20 matches the warm-start config; the
# bench compares this against the longer-warmup variant (apex_coldstart_w50).
apex_warmup_ratio = 0.20
apex_rampup_ratio = 0.10

apex_condition_shift_mode = "scalar"
apex_condition_shift_init_a = -1.0
apex_condition_shift_init_b = 0.5
apex_shift_lr_scale = 0.1

# 3 forwards/step → block swap incompatible (see apex.md §"Memory and block swap").
blocks_to_swap = 0
# gradient_checkpointing = true
# unsloth_offload_checkpointing = true
