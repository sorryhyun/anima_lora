# IP-Adapter — decoupled image cross-attention.
# GUI-friendly self-contained variant — no toggle blocks.
#
# Adapter-only: DiT is frozen, training updates only the Perceiver resampler
# and the per-block to_k_ip / to_v_ip projections.
#
# Source data: post_image_dataset/resized/   (shared with the LoRA pipeline)
# Caches:      post_image_dataset/lora/        (shared with the LoRA pipeline —
#              latents + text-emb + PE features; populate via `make preprocess`
#              + `make preprocess-pe`)

dataset_config = "configs/datasets/ip_adapter.toml"

network_module = "networks.methods.ip_adapter"

# K = number of IP tokens (resampler output slots).
network_dim = 16

network_args = [
    "encoder=pe",                # PE-Core-L14-336 (dynamic resolution)
    "encoder_dim=1024",
    "resampler_layers=2",
    "resampler_heads=8",
    # Step 0 = baseline DiT is enforced by the per-block ip_gate (init 0),
    # not by shrinking K/V. Default Kaiming-uniform init so the IP path
    # carries signal as soon as the gate opens.
    "ip_scale=1.0",
]

output_name = "anima_ip_adapter"

logging_dir = "output/logs"
log_with = "tensorboard"

learning_rate = 1e-4
max_train_epochs = 12
save_every_n_epochs = 12
checkpointing_epochs = 12

# PE features must be pre-cached via `make exp-ip-adapter-preprocess` so training never
# loads the vision encoder. Set ip_features_cache_to_disk=false to fall back
# to live PE encoding (slower; only useful for ad-hoc experimentation).
ip_features_cache_to_disk = true

use_ip_adapter = true
ip_image_drop_p = 0.1
caption_dropout_rate = 0.2

blocks_to_swap = 0
compile_mode = "full"
