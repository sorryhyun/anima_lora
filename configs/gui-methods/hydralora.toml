# gui-methods/hydralora.toml — HydraLoRA (MoE-style multi-head routing).
#
# Shared lora_down + per-expert lora_up heads, routed layer-locally from the
# adapted Linear's input. Produces a `anima_hydra*_moe.safetensors` sibling
# consumed by `make test-hydra` for router-live inference. See
# docs/methods/hydra-lora.md.
#
# This stack keeps OrthoLoRA + T-LoRA on under the hood (the trained default).

network_dim = 16
network_alpha = 16

learning_rate = 5e-5
max_train_epochs = 4
save_every_n_epochs = 2
checkpointing_epochs = 2

caption_shuffle_variants = 4
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

use_ortho = true

use_timestep_mask = true
min_rank = 1
alpha_rank_scale = 1.0

use_hydra = true
num_experts = 4
balance_loss_weight = 0.001
# Hold the load-balance penalty at 0 during the first 40% of training so the
# router can specialize, then flip it on to stop the diverged router from
# collapsing further. 0.0 disables the warmup (legacy behavior).
balance_loss_warmup_ratio = 0.1
expert_warmup_ratio = 0.1
expert_warmup_k = 1
# Experimental: greedy top-k expert selection by per-expert grad norm
# (post-backward). Mutually exclusive with expert_warmup_ratio above.
expert_best_warmup_ratio = 0
# Narrow MoE to cross-attn q/kv + MLP (DiT). Self-attn, output_proj, and the
# LLM-adapter blocks fall back to plain OrthoLoRAExp (use_ortho=true). See
# configs/methods/lora.toml for the reasoning.
hydra_router_layers = ".*(mlp\\.layer[12])$"

output_name = "anima_hydra"

blocks_to_swap = 0
