# gui-methods/ortholora.toml — OrthoLoRA (SVD-based orthogonal LoRA).
#
# Linear layers only. At save time the checkpoint is written as a plain LoRA
# via thin SVD on ΔW, so this is drop-in compatible with any LoRA consumer.

network_dim = 32
network_alpha = 32

learning_rate = 2e-5
max_train_epochs = 4
save_every_n_epochs = 2
checkpointing_epochs = 2

caption_shuffle_variants = 8
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

use_ortho = true

output_name = "anima_ortho"

blocks_to_swap = 10
