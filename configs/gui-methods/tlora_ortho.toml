# gui-methods/tlora_ortho.toml — T-LoRA + OrthoLoRA (mergeable combo).
#
# Stacks timestep-dependent rank masking (T-LoRA) on top of orthogonal
# parameterization (OrthoLoRA). Both are saved as plain LoRA at checkpoint
# time (OrthoLoRA via thin SVD, T-LoRA mask is training-only), so the result
# is fully bakeable into the base DiT via the Merge tab. Good general-purpose
# choice when you want T-LoRA's regularization without the ReFT side-channel.

network_dim = 32
network_alpha = 32

learning_rate = 2e-5
max_train_epochs = 4
save_every_n_epochs = 2
checkpointing_epochs = 2

use_shuffled_caption_variants = true
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

use_ortho = true

use_timestep_mask = true
min_rank = 1
alpha_rank_scale = 1.0

output_name = "anima_tlora_ortho"

blocks_to_swap = 0
