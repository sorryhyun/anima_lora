# gui-methods/prefix.toml — Prefix tuning (prepend N vectors to cross-attn).
#
# Prepends N learned vectors to the start of the cross-attention sequence.
# No base LoRA required.

network_module = "networks.methods.postfix"
network_dim = 16
network_args = ["mode=prefix"]
output_name = "anima_prefix"

learning_rate = 1e-4
max_train_epochs = 1
save_every_n_epochs = 1
checkpointing_epochs = 1

use_shuffled_caption_variants = true
cache_llm_adapter_outputs = true

multiscale_loss_weight = 0.5

blocks_to_swap = 0
gradient_accumulation_steps = 4
