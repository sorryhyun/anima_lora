# gui-methods/hydralora_sigma.toml — HydraLoRA + σ-conditional router.
#
# HydraLoRA (shared down + per-expert up heads) with a tiny sinusoidal(σ)→E
# bias MLP per router, letting expert choice vary with denoising timestep.
# Zero-init at the final layer → step-0 identical to base HydraLoRA, σ-
# dependence only emerges if gradients push it. See docs/methods/hydra-lora.md.

network_dim = 32
network_alpha = 32

learning_rate = 2e-5
max_train_epochs = 4
save_every_n_epochs = 2
checkpointing_epochs = 2

caption_shuffle_variants = 8
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

use_ortho = true

use_timestep_mask = true
min_rank = 1
alpha_rank_scale = 1.0

use_hydra = true
num_experts = 4
balance_loss_weight = 0.001
expert_init_std = 1.0e-4
expert_warmup_ratio = 0.1
# Narrow MoE to cross-attn q/kv + MLP (DiT). Self-attn, output_proj, and the
# LLM-adapter blocks fall back to plain OrthoLoRAExp (use_ortho=true). See
# configs/methods/lora.toml for the reasoning.
hydra_router_layers = ".*(cross_attn\\.(q_proj|kv_proj)|mlp\\.layer[12])$"

use_sigma_router = true
# σ features are concatenated to the router input (widens Linear(r,E) → Linear(r+F,E)).
# 16 = 8 cos/sin pairs — over-resolves σ ∈ [0,1]. Must be even.
sigma_feature_dim = 16
sigma_hidden_dim = 16   # unused; retained for API compat
sigma_router_layers = ".*(cross_attn\\.q_proj|self_attn\\.qkv_proj)$"
per_bucket_balance_weight = 0.3
num_sigma_buckets = 3

output_name = "anima_hydra_sigma"

blocks_to_swap = 14
