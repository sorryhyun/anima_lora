base_config = "base.toml"
dataset_config = "configs/dataset_config.toml"
network_module = "networks.postfix_anima"
# network_dim = K (number of learned postfix tokens per sample)
network_dim = 64
network_args = [
    "mode=cond",
    "splice_position=end_of_sequence",
    "cond_hidden_dim=256",
]
caption_shuffle_variants = 1
checkpointing_epochs = 1
learning_rate = 1e-3
max_train_epochs = 4
save_every_n_epochs = 1
attn_mode = "flash"
cache_llm_adapter_outputs = true
trim_crossattn_kv = false  # incompatible with end_of_sequence splice
output_name = "anima_postfix_func"
blocks_to_swap = 0
gradient_accumulation_steps = 4

# Functional MSE loss against inversion runs
# Requires <stem>_inverted_run{0..N-1}.safetensors in this directory.
# Samples without matching inversions contribute only the standard diffusion loss.
inversion_dir = "inversions_50x3/results"
functional_loss_weight = 1.0
functional_loss_blocks = "8,12,16,20"
functional_loss_num_runs = 3
