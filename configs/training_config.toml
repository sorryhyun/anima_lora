pretrained_model_name_or_path = "models/diffusion_models/anima-preview2.safetensors"
qwen3 = "models/text_encoders/qwen_3_06b_base.safetensors"
vae = "models/vae/qwen_image_vae.safetensors"

dataset_config = "configs/post_dataset_config.toml"
output_dir = "output"
output_name = "anima_lora"
save_model_as = "safetensors"

network_module = "networks.lora_anima"
network_dim = 32
network_alpha = 32
network_train_unet_only = true

learning_rate = 2e-5
optimizer_type = "AdamW8bit"
lr_scheduler = "constant"

timestep_sampling = "sigmoid"
discrete_flow_shift = 1.0

max_train_epochs = 64
save_every_n_epochs = 8
mixed_precision = "bf16"

gradient_checkpointing = true
cache_latents = true
cache_latents_to_disk = true
cache_text_encoder_outputs = true
cache_llm_adapter_outputs = true
lora_fp32_accumulation = true
vae_chunk_size = 64
vae_disable_cache = true
attn_mode = "flash"
blocks_to_swap = 0
caption_shuffle_variants = 8
masked_loss = true
checkpointing_epochs=4