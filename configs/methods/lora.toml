# -------------
# REPA (Yu et al., arxiv:2410.06940) — auxiliary alignment loss between a
# mid-block DiT hidden state and a cached PE-Core feature. Composes on top
# of any LoRA variant. Requires {stem}_anima_pe.safetensors sidecars from
# `make preprocess-pe` for every image (auto-enables ip_features_cache_to_disk).
# Hooks one DiT block; default 8 of 28 mirrors the paper's SiT-XL choice.

# use_repa = true
# repa_weight = 0.5
# repa_layer = 8
# repa_lr_scale = 1.0       # head LR = repa_lr_scale * unet_lr


# -------------
# SNR-t bias diagnostic — paired forward/reverse velocity-norm gap on the
# val set, integrated over the late half. Tracks the same bias DCW patches
# at sampler-time, and correlates with sample quality where FM-MSE val
# loss often does not (see docs/methods/dcw.md). LoRA family only —
# automatically skipped when APEX / IP-Adapter / EasyControl are active.
# Cost: one full reverse rollout per val batch (~val_steps × bias_steps
# extra DiT forwards per validation pass).

# validation_bias_metric = true
# validation_bias_steps = 12   # half of inference's 24; raise for higher resolution

# -------------
# Per-LoRA DCW calibration — at end-of-training, run one reverse rollout
# per anchor in dcw_calibration_anchors (plus a baseline if not cached
# from validation_bias_metric), pick the λ_LL that empirically minimized
# the late-half weighted |gap_LL|², and write it into the safetensors
# metadata as ss_dcw_recipe. `inference.py --dcw` (and `make test-lora-dcw`)
# reads that recipe automatically. Baseline (λ=0) is always a candidate
# so flat-style LoRAs that DCW hurts can land on "no correction". Cost:
# N anchor passes + (0 or 1) baseline pass per training run. See
# docs/proposal/lora-dcw-proposal.md.

calibrate_dcw_recipe = true
dcw_calibration_anchors = [-0.015, -0.022, -0.030]   # λ_LL values to probe
dcw_calibration_steps = 28                            # match inference; cheap (one-shot)
dcw_calibration_schedule = "one_minus_sigma"          # σ-shape weighting

compile_mode = "full"
compile_inductor_mode = "reduce-overhead"


# ── Per-channel input pre-scaling (SmoothQuant-style, optional) ─────────
# Balances ∂L/∂lora_down column gradients when activations have DC-bias
# outlier channels (see archive/bench/channel_dominance_analysis.md). Calibration-
# only — no runtime overhead. Generate the stats file once:
#   python archive/bench/analyze_lora_input_channels.py \
#       --dump_channel_stats archive/bench/results/channel_stats.safetensors
# Then flip `per_channel_scaling` on. α=0.5 = SmoothQuant default (sqrt
# balance); α=1.0 fully flattens per-channel scale; α=0 disables.
# per_channel_scaling = true
# channel_stats_path = "archive/bench/results/channel_stats.safetensors"
# channel_scaling_alpha = 0.5
