# LoRA family — method selection via toggle blocks.
#
# Default (uncommented) = classic LoRA.
# To switch methods:
#   - T-LoRA: uncomment the T-LoRA block, comment out any classic-LoRA values
#             it overrides (`network_alpha`, `network_dim`, lr, epochs, …).
#   - T-LoRA + ReFT: same idea, uncomment the T-LoRA + ReFT block.
#   - HydraLoRA: uncomment the HydraLoRA block.
# Each variant sets its own `output_name` so `make test`, `make test-hydra`
# key off the right artifact.
#
# Per-variant dim/alpha/lr/epochs are experiment drift, not calibrated
# defaults — tune freely.


network_alpha = 16
network_dim = 16

learning_rate = 1e-4
max_train_epochs = 1
save_every_n_epochs = 1
checkpointing_epochs = 1

caption_shuffle_variants = 8
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

# Ortho-lora

use_ortho = true


# Timestep mask

use_timestep_mask = true
min_rank = 1
alpha_rank_scale = 1.0


# hydralora

output_name = "anima_hydra"
use_hydra = true
num_experts = 4
balance_loss_weight = 0
expert_init_std = 0

# Router LR multiplier on top of unet_lr. Covers .router.* and .sigma_mlp.*.
# Router init is small (std=0.01) and lives in a softmax-uniform fixed point;
# 5–10× accelerates breaking symmetry. 1.0 = no override (legacy).
network_router_lr_scale = 20

# Fraction of training steps with one-expert-per-step gradient masking.
# Forward stays full MoE; only the randomly-chosen expert's up-weight slice
# gets gradient. Forces specialization without ever isolating an expert.
# expert_warmup_ratio = 0.1

# Which target Linears actually get the MoE wrapper. Non-matching layers fall
# back to plain LoRA (or OrthoLoRAExp when use_ortho=true). Default narrows
# ~256 routers down to ~112 by keeping MoE on the two sites where semantic
# specialization is learnable — DiT cross-attn q/kv and MLP — and dropping
# self-attn, output_proj, and the LLM-adapter blocks to plain LoRA. Leave
# unset (or set to empty) to restore legacy "MoE on every target" behavior.

hydra_router_layers = ".*(cross_attn\\.(kv_proj)|mlp\\.layer[12])$"
# hydra_router_layers = ".*(cross_attn\\.kv_proj)$"

# timestep conditional hydralora

use_sigma_router = true
sigma_feature_dim = 128
sigma_hidden_dim = 128
sigma_router_layers = ".*(mlp\\.layer[12])$"
per_bucket_balance_weight = 0.3   # × balance_loss_weight, per-bucket term
num_sigma_buckets = 3

# reft — residual-stream intervention on DiT block outputs (Wu et al. 2024).
# One ReFTModule per selected block (NOT per internal Linear), matching the
# paper's parameter budget.
#   reft_layers = "all"       -> every block
#               = "last_8"    -> last 8 blocks (task-signal heavy)
#               = "first_4"   -> first 4 blocks
#               = "stride_2"  -> every 2nd block
#               = "3,7,11,15" -> explicit indices
# add_reft = true
# reft_dim = 64
# reft_alpha = 64
# reft_layers = "last_8"

blocks_to_swap = 18



# ── HydraLoRA (OrthoHydraLoRA) ──────────────────────────────────────────
# MoE multi-head routing: shared lora_down + per-expert lora_up_i, with
# per-module layer-local routing. Composed with OrthoLoRAExp + timestep
# masking. Produces a *_moe.safetensors sibling file consumed by
# `make test-hydra`. Multi-expert ups are VRAM-heavy — method-forced swap.
#
# use_hydra = true
# num_experts = 4
# balance_loss_weight = 0.001
# expert_init_std = 1.0e-4    # tiny perturb breaks expert-permutation symmetry; 0.0 restores legacy zero-init
# expert_warmup_ratio = 0.1    # fraction of steps with k=1 random expert-gradient masking; 0 disables



# ── σ-conditional HydraLoRA router (Track B) ───────────────────────────
# Adds a tiny sinusoidal(σ)→E bias MLP to each selected HydraLoRAModule's
# router. Zero-init at final layer → step-0 identical to base HydraLoRA.
# sigma_router_layers restricts the σ branch to the layer types the B0
# pre-analysis showed actually carry σ-correlation signal (cross_attn.q +
# self_attn.qkv); MLPs are skipped. Full doc: `timestep-hydra.md`.
#
# use_sigma_router = true
# sigma_feature_dim = 128
# sigma_hidden_dim = 128
# sigma_router_layers = ".*(cross_attn\\.q_proj|self_attn\\.qkv_proj)$"
# per_bucket_balance_weight = 0.3   # × balance_loss_weight, per-bucket term
# num_sigma_buckets = 3

# ── Per-channel input pre-scaling (SmoothQuant-style, optional) ─────────
# Balances ∂L/∂lora_down column gradients when activations have DC-bias
# outlier channels (see bench/channel_dominance_analysis.md). Calibration-
# only — no runtime overhead. Generate the stats file once:
#   python bench/analyze_lora_input_channels.py \
#       --dump_channel_stats bench/results/channel_stats.safetensors
# Then flip `per_channel_scaling` on. α=0.5 = SmoothQuant default (sqrt
# balance); α=1.0 fully flattens per-channel scale; α=0 disables.
# per_channel_scaling = true
# channel_stats_path = "bench/results/channel_stats.safetensors"
# channel_scaling_alpha = 0.5
