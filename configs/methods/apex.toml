# APEX — Self-adversarial condition-shift distillation (arXiv:2604.12322).
#
# Turns a pretrained velocity-field DiT into a 1-NFE (or 2-4 NFE) generator
# by querying the same network under a shifted text condition as an
# endogenous adversarial reference. No discriminator, no external teacher,
# no architectural change. See proposal.md for derivation and phase plan.
#
# Phase 1 defaults: plain LoRA rank 64, L_mix loss form (Phase 0 §7.2),
# scalar ConditionShift init (a=-0.5, b=1.0) — Table 7 peak GenEval cell,
# mandatory warmup (Phase 0 Finding B) at 20% of budget + 10% rampup,
# both expressed as fractions of max_train_steps.
#
# USAGE:
#   make apex                            # default preset
#   python tasks.py apex                 # cross-platform
#
# Warm-start from a prior LoRA checkpoint is REQUIRED in most cases — cold
# start catastrophically regresses (−48% NFE=1 W1 in Phase 0). Either load
# --network_weights <path> or keep the apex_warmup_ratio guard below >0.

output_name = "anima_apex"
logging_dir = "output/logs"
log_with = "tensorboard"

# Warm-start from the best tlora checkpoint. `save_weights` already converts
# OrthoLoRA → plain LoRA at save time (thin SVD on ΔW), so this file is a
# valid plain-LoRA warm-start — no converter needed. `dim_from_weights=true`
# makes `create_network_from_weights` infer rank/alpha per-module from the
# checkpoint, which is why network_dim / network_alpha are NOT set here.
#
# Note: APEX silently rewires this from "trainable adapter" to "merge into
# DiT at load time, then train a fresh same-rank adapter on top." Keeping
# the warm-start as a runtime adapter costs ~1.5 GB more peak VRAM and OOMs
# on a 16 GB card; the merge path matches the bench's cold-start memory
# profile. Trained file captures only the APEX delta on the merged base —
# stack with the warm-start tlora at inference, or re-merge via
# scripts/merge_to_dit.py to ship a single combined LoRA.
network_weights = "output/ckpt/anima_lora.safetensors"
dim_from_weights = true

# Longer than plain LoRA because APEX refine needs budget for the adversarial
# signal to take effect after warmup. Adjust upward if the loss is still
# trending down at end of training.
learning_rate = 1e-4
max_train_epochs = 4
save_every_n_epochs = 4
checkpointing_epochs = 4

use_shuffled_caption_variants = true
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.0

# APEX velocity-space loss weighting (Eq. 24 after Prop. 3 conversion).
weighting_scheme = "apex_omega"

# APEX hyperparameters (paper Eq. 25: L_APEX = lam_p*L_fake + lam_c*L_mix) ----
apex_lambda = 0.5           # target inner T_mix coefficient (Eq. 23) — ramps 0 → this
apex_lambda_c = 1.0         # outer L_mix weight, paper lam_c (constant)
apex_lambda_p = 1.0         # target outer L_fake weight, paper lam_p — ramps 0 → this
apex_loss_form = "mix"      # 'mix' (primary) | 'gapex' (debug fallback)

# Warmup + rampup schedule (Phase 0 Finding B — Anima cold-start guard).
# Inner lambda and outer L_fake weight both ramp 0 → target across this window.
# At inner lambda=0, L_mix collapses to pure FM (T_mix = v_data), so warmup
# trains pure flow-matching at strength apex_lambda_c. No-op for the paper
# at 20B scale; required at Anima scale only when starting from random init.
#
# With network_weights warm-start (baked into DiT via promote_warmstart_to_merge)
# F_θ at step 0 IS already a converged FM model, so x_fake = x_t - t·F_θ is
# clean data, not noise — the cold-start failure mode (L_fake fitting random
# trajectories through shared weights) cannot trigger. Pure-FM warmup just
# wastes ~20% of the budget AND pays the 3× forward cost during the wasted
# window. Keeping a 10% rampup as a soft on-ramp into the adversarial regime.
apex_warmup_ratio = 0.0     # warm-start makes the cold-start guard redundant
apex_rampup_ratio = 0.10    # linear ramp of inner lambda + L_fake from step 0

# ConditionShift (c_fake = A*c + b, Eq. 9).
# `scalar` (a*c + b, 2 params) is the paper's headline mode at 20B scale but
# at Anima scale it lands in a degenerate fixed point: the DiT is
# condition-invariant to a uniform affine on cross-attn embeddings (LN +
# softmax absorb it), so v_fake_sg ≈ F_real, MSE(v_fake_sg, F_real) → 0,
# L_mix collapses to 0.25*FM and the adversarial signal vanishes. Watch
# `apex/v_fake_divergence` in TB to confirm the shift is doing something.
# `diag` gives 1024 per-channel (a_i, b_i) which can rotate/distort the
# embedding enough that the model produces a meaningfully different output.
apex_condition_shift_mode = "diag"
apex_condition_shift_init_a = -0.5   # Table 7 stable optimum (broadcast per-dim)
apex_condition_shift_init_b = 1.0    # Table 7 range [0.1, 1.0]
apex_shift_lr_scale = 1.0            # 1x LoRA LR. 0.1 left (a,b) glued to init in
                                     # the first run (drift <3% over 7k steps),
                                     # so L_fake never drove the adversarial signal.
                                     # Table 7's stable region is wide enough.


blocks_to_swap = 0
# compile_mode = "full"
