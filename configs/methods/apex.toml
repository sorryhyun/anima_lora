# APEX — Self-adversarial condition-shift distillation (arXiv:2604.12322).
#
# Turns a pretrained velocity-field DiT into a 1-NFE (or 2-4 NFE) generator
# by querying the same network under a shifted text condition as an
# endogenous adversarial reference. No discriminator, no external teacher,
# no architectural change. See proposal.md for derivation and phase plan.
#
# Phase 1 defaults: plain LoRA rank 64, L_mix loss form (Phase 0 §7.2),
# scalar ConditionShift init (a=-1.0, b=0.5) from Table 7 optimum,
# mandatory warmup (Phase 0 Finding B) at 20% of budget + 10% rampup,
# both expressed as fractions of max_train_steps.
#
# USAGE:
#   make apex                            # default preset
#   python tasks.py apex                 # cross-platform
#
# Warm-start from a prior LoRA checkpoint is REQUIRED in most cases — cold
# start catastrophically regresses (−48% NFE=1 W1 in Phase 0). Either load
# --network_weights <path> or keep the apex_warmup_ratio guard below >0.

dataset_config = "configs/dataset_config.toml"

output_name = "anima_apex"

# Warm-start from the best tlora checkpoint. `save_weights` already converts
# OrthoLoRA → plain LoRA at save time (thin SVD on ΔW), so this file is a
# valid plain-LoRA warm-start — no converter needed. `dim_from_weights=true`
# makes `create_network_from_weights` infer rank/alpha per-module from the
# checkpoint, which is why network_dim / network_alpha are NOT set here.
network_weights = "output/anima-tlora-0415-12.safetensors"
dim_from_weights = true

# Longer than plain LoRA because APEX refine needs budget for the adversarial
# signal to take effect after warmup. Adjust upward if the loss is still
# trending down at end of training.
learning_rate = 1e-4
max_train_epochs = 2
save_every_n_epochs = 1
checkpointing_epochs = 1

caption_shuffle_variants = 8
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

# APEX velocity-space loss weighting (Eq. 24 after Prop. 3 conversion).
weighting_scheme = "apex_omega"

# APEX hyperparameters ------------------------------------------------------
apex_lambda = 1.0           # T_mix mixing coefficient (Eq. 23)
apex_lambda_p = 1.0         # weight on L_sup
apex_lambda_c = 1.0         # weight on L_mix (consistency)
apex_lambda_f = 1.0         # weight on L_fake (fake-flow fitting)
apex_loss_form = "mix"      # 'mix' (primary) | 'gapex' (debug fallback)

# Warmup + rampup schedule (Phase 0 Finding B — non-optional safety).
# Expressed as a fraction of max_train_steps so the schedule tracks the
# actual step budget (sample_ratio and epochs) instead of a fixed count.
apex_warmup_ratio = 0.20    # pure L_sup window before adversarial terms
apex_rampup_ratio = 0.10    # linear ramp of lam_c / lam_f after warmup

# ConditionShift (c_fake = A*c + b, Eq. 9).
apex_condition_shift_mode = "scalar"
apex_condition_shift_init_a = -1.0   # Table 7 stable optimum
apex_condition_shift_init_b = 0.5    # Table 7 range [0.1, 1.0]
apex_shift_lr_scale = 0.1            # 0.1x LoRA LR — keeps (a,b) off the unstable corner

# Memory — 3 DiT forwards per step (real + fake@real_xt sg + fake@fake_xt).
# Block swap is INCOMPATIBLE with APEX's multi-forward pattern: after the
# first forward, blocks_to_swap blocks are on CPU, and the second forward
# tries to run through them and crashes with a FakeTensor device-mismatch
# from torch.compile. postfix_func.toml hits the same constraint (it also
# does a second no_grad forward) and resolves it the same way: force 0.
# If the 3× forward is too heavy for your card, reduce rank or batch
# rather than re-enabling block swap here.
blocks_to_swap = 0
gradient_checkpointing = true
unsloth_offload_checkpointing = true