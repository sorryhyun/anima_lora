# DoRA + timestep masking — DoRA magnitude with rank annealing.

dataset_config = "configs/dataset_config.toml"

network_dim = 16
network_alpha = 16

use_dora = true
use_timestep_mask = true
min_rank = 1
alpha_rank_scale = 1.0

learning_rate = 5e-5
max_train_epochs = 8
save_every_n_epochs = 8

caption_shuffle_variants = 4
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1
