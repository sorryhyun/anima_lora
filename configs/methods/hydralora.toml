# OrthoHydraLoRA — Cayley-parameterized MoE multi-head LoRA.
# Combines OrthoLoRAExp (SVD-init, Cayley orthogonality) with HydraLoRA
# (shared down + per-expert up + layer-local routing).

dataset_config = "configs/dataset_config.toml"

# Distinct from the default "anima_lora" so the _moe file doesn't
# collide with regular LoRA runs and `make test-hydra` can key off it.
output_name = "anima_hydra"

network_alpha = 32
network_dim = 32

use_hydra = true
# Per-module layer-local routing lets each Linear specialize independently,
# so the coarse k=12 artist-clustering heuristic no longer applies. k=4 is
# the new default; raise if per-module utilization logs show collapse.
num_experts = 4
balance_loss_weight = 0.01

learning_rate = 2e-5
max_train_epochs = 2
save_every_n_epochs = 2
checkpointing_epochs = 2

caption_shuffle_variants = 8
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

use_ortho_exp = true

use_timestep_mask = true
min_rank = 1
alpha_rank_scale = 1.0

# Multi-expert up-projections are VRAM-heavy — method-forced swap.
blocks_to_swap = 18
