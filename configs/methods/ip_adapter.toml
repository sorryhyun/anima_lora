# IP-Adapter — decoupled image cross-attention.
#
# Adapter-only: DiT is frozen, training updates only the resampler and the
# per-block to_k_ip / to_v_ip projections (~few hundred MB of params total).
# Reference image and VAE target come from the SAME image (the dataset is
# self-paired). CFG dropout zeros image conditioning with probability
# `image_drop_p` so inference can do image-CFG independently of text-CFG.
#
# Source data: ip-adapter-dataset/  (user puts {stem}.png/.jpg/.webp + {stem}.txt here)
# Caches:      post_image_dataset/ip-adapter/  ({stem}_anima_te.safetensors,
#              {stem}_{WxH}_anima.npz, {stem}_anima_pe.safetensors)
# The cache_dir redirect comes from configs/datasets/ip_adapter.toml referenced below.
#
# Feature source: defaults to PRE-CACHED PE features
# ({stem}_anima_pe.safetensors produced by `make ip-adapter-cache`). This lets
# cache_latents / cache_text_encoder_outputs all stay true and skips loading
# the vision encoder during training. Set `ip_features_cache_to_disk = false`
# and `cache_latents = false` to fall back to the original live-encoding path.

dataset_config = "configs/datasets/ip_adapter.toml"

network_module = "networks.ip_adapter_anima"

# K = number of IP tokens (resampler output slots). 16 is a good default.
network_dim = 16

network_args = [
    "encoder=pe",                # PE-Core-L14-336 (dynamic resolution; ~257 patch tokens)
    "encoder_dim=1024",          # PE-Core-L14-336 hidden dim
    "resampler_layers=2",
    "resampler_heads=8",
    "ip_init_std=1e-4",          # near-zero init so step 0 = baseline DiT
    "ip_scale=1.0",
]

output_name = "anima_ip_adapter"

logging_dir = "output/logs"
log_with = "tensorboard"

learning_rate = 1e-4
max_train_epochs = 12
save_every_n_epochs = 12
checkpointing_epochs = 12

# Cached-feature path: VAE latents, text encoder outputs, AND PE patch features
# all live on disk as sibling sidecars of post_image_dataset/*.png. The vision
# encoder is NOT loaded during training, and batch["images"] is unused.
# Run `make ip-adapter-cache` once before training to populate the .pe sidecars.
# (cache_latents{_to_disk} and cache_text_encoder_outputs{_to_disk} default to
# true in configs/base.toml — only the IP-specific flag is set here.)
ip_features_cache_to_disk = true

# CFG dropout for image conditioning (independent of text dropout).
# Read by train.py when use_ip_adapter is on.
use_ip_adapter = true
ip_image_drop_p = 0.1
caption_dropout_rate = 0.2

# DiT is frozen; no need for block swapping. Adapter+resampler+vision-encoder
# fit comfortably alongside the DiT in bf16.
blocks_to_swap = 0
compile_mode = "full"