# Postfix / Prefix tuning — adapter cross-attention token learning.
#
# Default (uncommented) = postfix (appends N vectors at end of sequence).
# To switch modes:
#   - postfix_exp  = caption-conditional MLP ("cond" mode)
#   - postfix_func = postfix_exp + functional MSE loss vs inversion runs
#   - postfix_sigma = postfix_exp + σ-conditional residual ("cond-timestep" mode)
#   - prefix       = prepends vectors at start of sequence
# Uncomment the target block and comment out the postfix values it overrides.
# Each variant sets its own `output_name` so `make test-postfix[-exp|-func]`
# and `make test-prefix` each pick up the right artifact.
#
# Per-variant dim/args/epochs are experiment drift, not calibrated defaults.

network_module = "networks.postfix_anima"

# ── Postfix ─────────────────────────────────────────────────────────────
# enum network_dim: postfix=16 | postfix_exp=64 | postfix_func=64 | prefix=16
network_dim = 32
# network_args = ["mode=postfix", "splice_position=end_of_sequence"]
#
# slot_embed_init_std   — breaks the K-slot permutation symmetry that otherwise
#                         keeps effective K=1 forever (§A). 0 = off.
# contrastive_weight    — off-diagonal cosine penalty on cond_mlp outputs
#                         (NOT the full postfix — σ-residual would swallow the
#                         gradient). Fights caption-agnostic collapse (§C).
#                         Accumulator uses top-level `gradient_accumulation_steps`
#                         (auto-forwarded), resets on optimizer-step boundary, so
#                         contrastive references are always same-weight. Needs
#                         gradient_accumulation_steps ≥ 2 for any signal.
# sigma_budget_weight   — soft L2 on ‖sigma_residual‖² (§B). Without this, the
#                         σ-branch grows to 2.5× the base and eats capacity that
#                         should belong to cond_mlp. cond-timestep only.
network_args = [
    "mode=cond-timestep",
    "splice_position=front_of_padding", # front_of_padding | end_of_sequence
    "cond_hidden_dim=256",
    "sigma_feature_dim=32",
    "sigma_hidden_dim=128",
    "slot_embed_init_std=0.02",
    "contrastive_weight=0.1",
    "sigma_budget_weight=1e-3",
]
output_name = "anima_postfix"

learning_rate = 1e-4
max_train_epochs = 1
save_every_n_epochs = 1
checkpointing_epochs = 1

caption_shuffle_variants = 4
cache_llm_adapter_outputs = true

# Postfix training needs a base LoRA and accumulates on cached TE — method-forced.
blocks_to_swap = 0
gradient_accumulation_steps = 4
# lora_path = "output/ckpt/anima-tlora-0415-12.safetensors"

# ── Postfix (exp — cond mode) ───────────────────────────────────────────
# Caption-conditional MLP injection. Override the postfix values above.
#
# network_dim = 64
# network_args = [
#     "mode=cond",
#     "splice_position=end_of_sequence",
#     "cond_hidden_dim=256",
# ]
# output_name = "anima_postfix_exp"
# max_train_epochs = 2
# checkpointing_epochs = 2

# ── Postfix (func — cond mode + functional MSE vs inversions) ───────────
# Same as postfix_exp plus functional loss against saved inversion runs.
# trim_crossattn_kv is incompatible with end_of_sequence splice.
#
# network_dim = 64
# network_args = [
#     "mode=cond",
#     "splice_position=end_of_sequence",
#     "cond_hidden_dim=256",
# ]
# output_name = "anima_postfix_func"
# max_train_epochs = 4
# caption_shuffle_variants = 1
# attn_mode = "flash"
# trim_crossattn_kv = false
# inversion_dir = "inversions/results"
# functional_loss_weight = 1.0
# functional_loss_blocks = "8,12,16,20"
# functional_loss_num_runs = 3

# ── Postfix (sigma — cond-timestep mode) ────────────────────────────────
# Caption-conditional base + σ-conditional residual (zero-init). Training
# starts identical to postfix_exp; σ-dependence only emerges if gradients push
# it. |sigma_residual| at convergence is the "did σ-conditioning help" knob.
# Not compatible with --spectrum or --tiled_diffusion at inference.
#
# network_dim = 64
# network_args = [
#     "mode=cond-timestep",
#     "splice_position=end_of_sequence",
#     "cond_hidden_dim=256",
#     "sigma_feature_dim=128",
#     "sigma_hidden_dim=256",
# ]
# output_name = "anima_postfix_sigma"
# max_train_epochs = 2
# checkpointing_epochs = 2

# ── Prefix ──────────────────────────────────────────────────────────────
# Prepends N vectors to cross-attention. No base LoRA — comment out
# `lora_path` above. No end_of_sequence splice.
#
# network_dim = 16
# network_args = ["mode=prefix"]
# output_name = "anima_prefix"
# caption_shuffle_variants = 2
# multiscale_loss_weight = 0.5
