base_config = "base.toml"

dataset_config = "configs/dataset_config.toml"

network_dim = 32
network_alpha = 32
use_dora = true
alpha_rank_scale = 1.0

learning_rate = 5e-5

max_train_epochs = 2
save_every_n_epochs = 2

attn_mode = "flash4"
caption_shuffle_variants = 8
cache_llm_adapter_outputs = true
trim_crossattn_kv = true
# loss_type = "pseudo_huber"  # smooth L1-like loss, robust to outliers
# pseudo_huber_c = 0.03       # small c -> L1-like, large c -> MSE-like