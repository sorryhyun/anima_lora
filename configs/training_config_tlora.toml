base_config = "base.toml"
dataset_config = "configs/dataset_config.toml"
network_alpha = 48
network_dim = 48
caption_shuffle_variants = 8
checkpointing_epochs = 4
learning_rate = 2e-5
max_train_epochs = 12
save_every_n_epochs = 4
attn_mode = "flash"
cache_llm_adapter_outputs = true
trim_crossattn_kv = false  # no-op without flash4 (see docs/fa4.md)

use_ortho=true
sig_type="last"
ortho_reg_weight=0.01
use_timestep_mask=true
min_rank=1
alpha_rank_scale=1.0
# loss_type = "pseudo_huber"  # smooth L1-like loss, robust to outliers
# pseudo_huber_c = 0.03       # small c -> L1-like, large c -> MSE-like
# multiscale_loss_weight = 0.1  # weight for 2x-downsampled loss term (0 = disabled)
blocks_to_swap = 20
