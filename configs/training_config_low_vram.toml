base_config = "base.toml"

dataset_config = "configs/dataset_config.toml"

network_dim = 16
network_alpha = 16

learning_rate = 5e-5

max_train_epochs = 2
save_every_n_epochs = 2
checkpointing_epochs = 2

gradient_checkpointing = true
unsloth_offload_checkpointing = true

attn_mode = "flash"
gradient_accumulation_steps = 1
cache_llm_adapter_outputs = true
trim_crossattn_kv = false  # no-op without flash4 (see docs/fa4.md)
