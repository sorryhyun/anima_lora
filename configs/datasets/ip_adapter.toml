# IP-Adapter dataset blueprint.
#
# Reuses the LoRA pipeline's resized images and on-disk caches under
# `post_image_dataset/resized` + `post_image_dataset/lora` (already populated by
# `make preprocess` / `make preprocess-pe`). Self-paired training: the reference
# image and the VAE target are the same image, so no separate dataset is needed.

[general]
shuffle_caption = false
caption_extension = '.txt'
keep_tokens = 3

[[datasets]]
resolution = 1024
batch_size = 1
enable_bucket = true
validation_split = 0.025
validation_seed = 42

  [[datasets.subsets]]
  image_dir = 'post_image_dataset/resized'
  cache_dir = 'post_image_dataset/lora'
  num_repeats = 1
