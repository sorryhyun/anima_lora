# IP-Adapter dataset blueprint.
#
# Source images + .txt captions live in `ip-adapter-dataset/` (user-facing).
# Preprocessed caches (VAE latents, text encoder outputs, PE features) are
# redirected to `post_image_dataset/ip-adapter/` via the subset-level
# `cache_dir` knob, so the source directory stays clean.

[general]
shuffle_caption = false
caption_extension = '.txt'
keep_tokens = 3

[[datasets]]
resolution = 1024
batch_size = 1
enable_bucket = true
validation_split = 0.025
validation_seed = 42

  [[datasets.subsets]]
  image_dir = 'ip-adapter-dataset'
  cache_dir = 'post_image_dataset/ip-adapter'
  num_repeats = 1
