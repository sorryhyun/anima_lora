# EasyControl dataset blueprint.
#
# Source images + .txt captions live in `easycontrol-dataset/` (user-facing).
# Preprocessed caches (VAE latents, text encoder outputs) are redirected to
# `post_image_dataset/easycontrol/` via the subset-level `cache_dir` knob,
# so the source directory stays clean.

[general]
shuffle_caption = false
caption_extension = '.txt'
keep_tokens = 3

[[datasets]]
resolution = 1024
batch_size = 1
enable_bucket = true
validation_split = 0.025
validation_seed = 42

  [[datasets.subsets]]
  image_dir = 'easycontrol-dataset'
  cache_dir = 'post_image_dataset/easycontrol'
  num_repeats = 1
