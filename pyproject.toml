[project]
name = "anima-lora"
version = "0.1.0"
description = "Standalone Anima LoRA training pipeline"
requires-python = ">=3.13"
dependencies = [
    # Core ML
    "torch>=2.11.0",
    "torchvision>=0.26.0",
    "accelerate>=1.13.0",
    "transformers>=5.3.0",
    "diffusers>=0.37.0",
    "einops>=0.7.0",

    # Optimizers
    "bitsandbytes",
    "lion-pytorch>=0.2.3",
    "schedulefree>=1.4",
    "pytorch-optimizer>=3.9.0",
    "prodigyopt>=1.1.2",

    # Data & Config
    "toml>=0.10.2",
    "voluptuous>=0.15.2",
    "safetensors>=0.7.0",
    "imagesize>=1.4.1",

    # Text processing
    "sentencepiece>=0.2.1",
    "huggingface-hub>=1.7.0",

    # Monitoring & Utilities
    "tensorboard",
    "rich>=14.0.0",
    "tqdm",
    "numpy",
    "Pillow",
    "psutil",
]

[project.optional-dependencies]
flash-attn = [
    "flash-attn @ https://github.com/mjun0812/flash-attention-prebuild-wheels/releases/download/v0.9.4/flash_attn-2.8.3+cu130torch2.11-cp313-cp313-linux_x86_64.whl",
]
mask = [
    "opencv-python>=4.8.0",
    "pyyaml",
    "sam3 @ git+https://github.com/facebookresearch/sam3.git",
    "packaging",
]

[tool.uv]
extra-index-url = ["https://download.pytorch.org/whl/cu130"]
index-strategy = "unsafe-best-match"
environments = ["sys_platform == 'linux'"]

[tool.setuptools]
packages = []

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
